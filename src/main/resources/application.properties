spring.application.name=fileBrain
server.port=8088

spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.project-id=gen-lang-client-0136140815
spring.ai.google.genai.location=us-central1
spring.ai.google.genai.chat.options.model=gemini-2.0-flash-lite
spring.ai.google.genai.chat.options.temperature=0.3
spring.ai.google.genai.embedding.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.embedding.project-id=gen-lang-client-0136140815
spring.ai.google.genai.embedding.location=us-central1
spring.ai.google.genai.embedding.text.options.model=gemini-embedding-001

spring.datasource.url=${DATABASE_URL}

spring.jpa.hibernate.ddl-auto=update

file.storage-dir=./storage
input.directory=c:/temp/ingestion-files/
input.filename.regex=*.{pdf,docx,txt,pages,csv}

app.jwt.secret=${JWT_SECRET:mySecretKeyWithAtLeast32CharactersLongForHS256}
app.jwt.expiration=86400000
scheduling.enabled=true
