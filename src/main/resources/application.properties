spring.application.name=fileBrain
server.port=8088
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=llama3.1:latest

spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.url=jdbc:postgresql://localhost:5433/postgres

spring.jpa.hibernate.ddl-auto=none

file.storage-dir=./storage
input.directory=c:/temp/ingestion-files/
input.filename.regex=*.{pdf,docx,txt,pages,csv}

app.jwt.secret=${JWT_SECRET:mySecretKeyWithAtLeast32CharactersLongForHS256}
app.jwt.expiration=86400000
scheduling.enabled=true
